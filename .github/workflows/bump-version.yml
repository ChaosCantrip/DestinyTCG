name: Bump Version on PR Merge

on:
  workflow_call:
    inputs:
      pr-number:
        description: "The pull request number to operate on"
        required: true
        type: number
      pr-labels:
        description: "The labels applied to the pull request"
        required: true
        type: string
      username:
        description: "The username to use for git"
        default: "ChaosCantrip [Automated]"
        required: false
        type: string
      email:
        description: "The email to use for git"
        default: "dev@chaoscantrip.com"
        required: false
        type: string
      version-file:
        description: "The file containing the version number"
        default: "version.json"
        required: false
        type: string

jobs:
  bump-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3   

      - name: Set up Git
        run: |
          git config user.name "${{ inputs.username }}"
          git config user.email "${{ inputs.email }}"

      - name: Determine bump type from label (default to patch)
        id: bump
        run: |
          echo "bump=patch" >> $GITHUB_ENV
          if [[ "${{ inputs.pr-labels }}" == *"version:major"* ]]; then
            echo "bump=major" >> $GITHUB_ENV
          elif [[ "${{ inputs.pr-labels }}" == *"version:minor"* ]]; then
            echo "bump=minor" >> $GITHUB_ENV
          elif [[ "${{ inputs.pr-labels }}" == *"version:patch"* ]]; then
            echo "bump=patch" >> $GITHUB_ENV
          else
            echo "No version label found — defaulting to patch"
          fi

      - name: Bump version
        id: bump_version
        run: |
          VERSION=$(jq -r '.version' version.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          case "${{ steps.bump.outputs.bump }}" in
              major)
              MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor)
              MINOR=$((MINOR + 1)); PATCH=0 ;;
              patch)
              PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "New version: $NEW_VERSION"
          jq --arg v "$NEW_VERSION" '.version = $v' version.json > tmp && mv tmp version.json
          jq --arg v "$NEW_VERSION" '.version = $v' package.json > tmp && mv tmp package.json
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Update package-lock.json
        run: |
          npm install --package-lock-only

      - name: Commit and tag new version
        run: |
          git add version.json
          git add package.json
          git add package-lock.json
          
          git commit -m "Bump version to v${{ steps.bump_version.outputs.new_version }}"
          git tag "v${{ steps.bump_version.outputs.new_version }}"
          git push origin main --tags