name: Update Submodule

on:
  repository_dispatch:
    types: [update-submodule]

jobs:
  update-submodule:
    runs-on: ubuntu-latest
    steps:
      - name: Parse inputs
        id: parse_inputs
        run: |
          echo "BRANCH=${{ github.event.client_payload.branch }}" >> $GITHUB_ENV
          echo "SUBMODULE=${{ github.event.client_payload.submodule }}" >> $GITHUB_ENV
          echo "NEW_COMMIT=${{ github.event.client_payload.new_commit }}" >> $GITHUB_ENV

          echo "BRANCH=${BRANCH}"
          echo "SUBMODULE=${SUBMODULE}"
          echo "NEW_COMMIT=${NEW_COMMIT}"

      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config --global user.name "ChaosCantrip [Automated]"
          git config --global user.email "dev@chaoscantrip.com"

      - name: Checkout target branch
        run: git checkout ${{ env.BRANCH }}

      - name: Update submodule to new commit
        run: |
          cd apps/${{ env.SUBMODULE }}
          git fetch origin
          git checkout ${{ env.NEW_COMMIT }}
          cd ..

          git add apps/${{ env.SUBMODULE }}
          git commit -m "Update submodule ${{ env.SUBMODULE }}@${{ env.BRANCH }} to ${{ env.NEW_COMMIT }}"
          git push origin ${{ env.BRANCH }}